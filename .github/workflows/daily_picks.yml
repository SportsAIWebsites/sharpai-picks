name: Generate Daily Picks

on:
  schedule:
    - cron: '0 13 * * *'   # 9:00 AM ET every day
  workflow_dispatch:         # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate picks
        env:
          ODDS_API_KEY:   ${{ secrets.ODDS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_picks.py

      - name: Commit & push updated index.html
        run: |
          git config user.name  "SharpAI Bot"
          git config user.email "bot@sharpai.picks"
          git add index.html
          git diff --cached --quiet || git commit -m "🏈 Daily picks — $(date +'%Y-%m-%d')"
          git push
