name: Generate Daily Picks

on:
  schedule:
    # Runs every day at 9:00 AM ET (1:00 PM UTC)
    - cron: '0 13 * * *'
  workflow_dispatch:   # allows manual trigger from GitHub UI

permissions:
  contents: write      # needed to commit index.html back to the repo

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Generate picks
        env:
          ODDS_API_KEY:      ${{ secrets.ODDS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_picks.py

      - name: Commit & push updated index.html
        run: |
          git config user.name  "SharpAI Bot"
          git config user.email "bot@sharpai.picks"
          git add index.html
          git diff --cached --quiet || git commit -m "🏈 Daily picks — $(date +'%Y-%m-%d')"
          git push
